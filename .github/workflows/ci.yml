name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Unit, regression, sync-canary, and balance-canary tests
        run: python -m pytest -q

  sync-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Tribe/piece sync must hold across full bot games (all scenarios)
        run: |
          python -m fs_bot.tools.sync_check --scenario "Pax Gallica?" --seeds 1-8
          python -m fs_bot.tools.sync_check --scenario "Reconquest of Gaul" --seeds 1-8
          python -m fs_bot.tools.sync_check --scenario "The Great Revolt" --seeds 1-8
          python -m fs_bot.tools.sync_check --scenario "Ariovistus" --seeds 1-8

  player-fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Random-legal player fuzz (mixed seats) + cross-hashseed determinism
        run: |
          PYTHONHASHSEED=0 python -m fs_bot.tools.player_fuzz --seeds 1-40 > fuzz0.txt
          PYTHONHASHSEED=7 python -m fs_bot.tools.player_fuzz --seeds 1-40 > fuzz7.txt
          cat fuzz0.txt
          diff fuzz0.txt fuzz7.txt

  balance-guardrail:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Winners must match the committed baseline
        run: python -m fs_bot.tools.balance_smoke --seeds 1-20
